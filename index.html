<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>TrippingFest</title>
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div id="app">
    <div id="top-toolbar" class="toolbar">
      <button id="btn-record" title="Record">Rec</button>
      <button id="btn-play" title="Play Demos">Play</button>
      <button id="btn-undo" title="Undo">Undo</button>
      <button id="btn-clear" title="Clear">Clear</button>
      <button id="btn-save" title="Save PNG">Save</button>
    </div>

    <canvas id="drawing-canvas"></canvas>

    <div id="bottom-toolbar" class="toolbar">
      <input type="range" id="width-slider" min="1" max="100" value="12">
      <button id="btn-pattern" title="Pattern">P</button>
      <button id="btn-color" title="Color">C</button>
      <button id="btn-options" title="Options">O</button>
      <button id="btn-wildwalk" title="WildWalk">W</button>
    </div>
  </div>

  <div id="pattern-dialog" class="dialog hidden">
    <div class="dialog-content">
      <h3>Pattern</h3>
      <div id="pattern-list" class="button-grid"></div>
      <button class="dialog-close">Close</button>
    </div>
  </div>

  <div id="color-dialog" class="dialog hidden">
    <div class="dialog-content">
      <h3>Color</h3>
      <div id="color-mode-list" class="button-grid"></div>
      <div id="color-controls"></div>
      <button class="dialog-close">Close</button>
    </div>
  </div>

  <div id="options-dialog" class="dialog hidden">
    <div class="dialog-content">
      <h3>Options</h3>
      <div id="mirror-options"></div>
      <div id="transparency-control"></div>
      <button class="dialog-close">Close</button>
    </div>
  </div>

  <div id="playback-dialog" class="dialog hidden">
    <div class="dialog-content">
      <h3>Recordings</h3>
      <div id="recording-list" class="recording-grid"></div>
      <button class="dialog-close">Close</button>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
